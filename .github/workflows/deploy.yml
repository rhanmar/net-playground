name: deploy.yml

on:
  push:
    branches:
      - main

env:
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  HTTP_SERVER_HOST_PORT: ${{ secrets.HTTP_SERVER_HOST_PORT }}
  POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
  MIGRATIONS_DIR: ${{ secrets.MIGRATIONS_DIR }}
  APP_IMAGE_NAME: rhanmar/net-playground

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Install Taskfile
        uses: go-task/setup-task@v1
      - name: Pull repository
        uses: actions/checkout@v3
      - name: Run tests
        run: task test

  publish:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Pull repository
        uses: actions/checkout@v3
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Publish App
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.APP_IMAGE_NAME }}:latest

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            docker stop $(docker ps -q)
            docker pull ${{ env.APP_IMAGE_NAME }}:latest
            docker run \
            -d \
            -e POSTGRES_USER=${{ env.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ env.POSTGRES_DB }} \
            -e HTTP_SERVER_HOST_PORT=${{ env.HTTP_SERVER_HOST_PORT }} \
            -e POSTGRES_DSN=${{ env.POSTGRES_DSN }} \
            -e MIGRATIONS_DIR=${{ env.MIGRATIONS_DIR }} \
            ${{ env.APP_IMAGE_NAME }}:latest
