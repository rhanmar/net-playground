version: '3'

services:
  postgres:
    image: postgres:17-alpine
    container_name: dummy-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
